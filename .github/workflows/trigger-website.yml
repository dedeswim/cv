name: Build CV and trigger website rebuild

on:
  push:
    branches: [main, master]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install TeX Live
        uses: zauguin/install-texlive@v4
        with:
          texlive_version: 2026
          packages: >
            scheme-basic
            xetex
            latexmk
            moderncv
            academicons
            biblatex
            biber
            geometry
            etoolbox
            xcolor
            hyperref
            url
            fontawesome5
            fancyhdr
            microtype
            multirow
            colortbl
            arydshln
            pgf
            tools
            l3packages
            l3kernel
            iftex
            logreq
            xkeyval
            kvoptions
            kvsetkeys
            kvdefinekeys
            graphics
            hycolor
            refcount
            rerunfilecheck
            bigintcalc
            bitset
            gettitlestring
            infwarerr
            intcalc
            ltxcmds
            pdfescape
            pdftexcmds
            stringenc
            uniquecounter
            fontspec
            lm
            lm-math

      - name: Debug font lookup
        run: |
          kpsewhich academicons.ttf || echo "NOT FOUND by kpsewhich"
          find ~/texlive -name "academicons.ttf" 2>/dev/null || echo "NOT FOUND by find"
          kpsewhich tuacademicons.fd || echo "fd NOT FOUND"

      - name: Build CV
        run: latexmk -xelatex -file-line-error -halt-on-error -interaction=nonstopmode cv.tex

      - name: Commit PDF if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add cv.pdf
          if ! git diff --cached --quiet; then
            git commit -m "Build cv.pdf"
            git pull --rebase
            git push
          fi

      - name: Trigger website rebuild
        run: |
          gh api repos/dedeswim/dedeswim.github.io/dispatches \
            -f event_type=cv-updated
        env:
          GH_TOKEN: ${{ secrets.WEBSITE_DISPATCH_TOKEN }}
