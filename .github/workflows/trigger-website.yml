name: Build CV and trigger website rebuild

on:
  push:
    branches: [main, master]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build CV
        uses: xu-cheng/latex-action@v3
        with:
          root_file: cv.tex
          latexmk_use_xelatex: true

      - name: Commit PDF if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add cv.pdf
          git diff --cached --quiet || git commit -m "Build cv.pdf" && git push

      - name: Trigger website rebuild
        run: |
          gh api repos/dedeswim/dedeswim.github.io/dispatches \
            -f event_type=cv-updated
        env:
          GH_TOKEN: ${{ secrets.WEBSITE_DISPATCH_TOKEN }}
