name: Trigger website rebuild

on:
  push:
    branches: [main, master]

jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger website rebuild
        run: |
          gh api repos/dedeswim/dedeswim.github.io/dispatches \
            -f event_type=cv-updated
        env:
          GH_TOKEN: ${{ secrets.WEBSITE_DISPATCH_TOKEN }}
